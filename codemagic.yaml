definitions:
  environment:
    flutter: stable
    java: 17

workflows:
  # Build Android APK Release - SANS KEYSTORE
  android-apk-release:
    name: Android APK Release Build
    instance_type: mac_mini
    max_build_duration: 120
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/sdks/flutter" > android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
      
      - name: Get Flutter packages
        script: flutter pub get
      
      - name: Build APK Release
        script: flutter build apk --release
    
    artifacts:
      - build/app/outputs/apk/release/app-release.apk
    
    publishing:
      slack:
        channel: "#builds"
        notify_on_build_completion: true

  # Build Android APK Debug
  android-apk-debug:
    name: Android APK Debug Build
    instance_type: mac_mini
    max_build_duration: 120
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/sdks/flutter" > android/local.properties
          echo "flutter.buildMode=debug" >> android/local.properties
      
      - name: Get Flutter packages
        script: flutter pub get
      
      - name: Build APK Debug
        script: flutter build apk --debug
    
    artifacts:
      - build/app/outputs/apk/debug/app-debug.apk

  # Code Analysis
  analyze:
    name: Code Analysis
    instance_type: mac_mini
    max_build_duration: 30
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      
      - name: Run analyzer
        script: flutter analyze
