# Project-wide Gradle settings.

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the
# command line, check that file is well formed and can be parsed correctly.

# The following line sets the JVM arguments used for building.
# The setting is particularly useful for headless machines on which you don't have display attached.
# Default value: -Xmx1024m -XX:MaxPermSize=256m
# org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=out

# When configured, Gradle will run in incubator mode and use experimental features.
# This option is currently only used to configure away warnings for items configured with show in
# in the 'android' closure of the build.gradle file (i.e. compileSdkVersion 'android-L')
# org.gradle.experimental=true

# Enables namespacing of each library's R class so that its R class includes only the
# resources declared in the library itself and does not include transitive dependencies.
# This property enables resources to be bundled with any module and any modules can consume the
# resources. If false, aapt merges all the dependent resources before building the APK, so
# application, tests and dependencies will have access to the same R class. Applications should
# always set this property to true.
android.useNamespace=true

# Gradle build properties
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# Android build properties
android.compileSdk=34
android.targetSdk=34
android.minSdk=21
android.ndkVersion=25.1.8937393

# Java properties
java.sourceCompatibility=17
java.targetCompatibility=17

# Flutter properties
flutter.buildMode=debug
flutter.targetPlatform=android-arm64

# Enable Kotlin DSL
kotlin.code.style=official