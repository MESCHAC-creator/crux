name: crux
description: "Premium video conferencing with LiveKit. Secure, scalable, Francophone-first."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"      # 🛠️ Adapté rétroactivement pour votre SDK Dart actuel
  flutter: ">=3.24.0"         # 🛠️ Parfaitement aligné avec Flutter 3.44.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # =====================
  # REALTIME / VIDEO & AUDIO CONTROLS
  # =====================
  livekit_client: ^2.5.0       # ✅ Version stable et ultra-compatible avec Flutter 3.44
  audio_session: ^0.1.19
  wakelock_plus: ^1.2.5

  # =====================
  # STATE MANAGEMENT
  # =====================
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # =====================
  # FIREBASE (STABLE ET COMPATIBLE DART < 3.6.0)
  # =====================
  firebase_core: ^4.7.0       # 🔥 Version pivot pour éviter les conflits de compilation
  firebase_auth: ^6.1.2       # 🎯 Alignement issu du BOM Firebase pour Dart précédent
  cloud_firestore: ^6.1.0     # 🎯 Version stable compatible Dart pré-3.6.0
  firebase_messaging: ^15.1.3
  firebase_analytics: ^12.0.4
  firebase_crashlytics: ^5.1.3

  # =====================
  # NOTIFICATIONS AVANCÉES
  # =====================
  flutter_local_notifications: ^17.2.0

  # =====================
  # UI FRAMEWORK & LAYOUT
  # =====================
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.2.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  gap: ^3.0.1

  # =====================
  # LOCALIZATION (FR + WEST AFRICAN)
  # =====================
  intl: ^0.19.0
  easy_localization: ^3.0.7

  # =====================
  # STORAGE & SECURITY
  # =====================
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # =====================
  # PERMISSIONS & DEVICE
  # =====================
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # =====================
  # NETWORKING
  # =====================
  dio: ^5.4.3
  http: ^1.2.1
  socket_io_client: ^3.1.1
  connectivity_plus: ^6.0.3

  # =====================
  # UTILITIES
  # =====================
  uuid: ^4.3.3
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  logger: ^2.3.0

  # =====================
  # MEDIA & QR
  # =====================
  image_picker: ^1.1.0
  video_player: ^2.8.5
  share_plus: ^9.0.0
  qr_flutter: ^4.1.0

  # =====================
  # UX POLISH
  # =====================
  keyboard_dismisser: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
