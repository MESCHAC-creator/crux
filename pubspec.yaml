name: crux
description: "Premium video conferencing with LiveKit. Secure, scalable, Francophone-first."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.4 <4.0.0"  # 🎯 Locks down cleanly for your Dart 3.5.4 environment
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # =====================
  # REALTIME / VIDEO & AUDIO CONTROLS
  # =====================
  livekit_client: ^2.3.1+hotfix.1 # 🛠️ Downgraded to clear the Dart 3.5.4 compiler block
  audio_session: ^0.1.19
  wakelock_plus: ^1.2.5

  # =====================
  # STATE MANAGEMENT
  # =====================
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # =====================
  # FIREBASE (STABLE & SYNCHRONIZED FOR DART 3.5.x)
  # =====================
  firebase_core: ^3.6.0       
  firebase_auth: ^5.3.1       
  cloud_firestore: ^5.4.4     
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3 

  # =====================
  # NOTIFICATIONS AVANCÉES
  # =====================
  flutter_local_notifications: ^17.2.0

  # =====================
  # UI FRAMEWORK & LAYOUT
  # =====================
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.2.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  gap: ^3.0.1

  # =====================
  # LOCALIZATION (FR + WEST AFRICAN)
  # =====================
  intl: ^0.19.0
  easy_localization: ^3.0.7

  # =====================
  # STORAGE & SECURITY
  # =====================
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # =====================
  # PERMISSIONS & DEVICE
  # =====================
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # =====================
  # NETWORKING
  # =====================
  dio: ^5.4.3
  http: ^1.2.1
  socket_io_client: ^3.1.1
  connectivity_plus: ^6.0.3

  # =====================
  # UTILITIES
  # =====================
  uuid: ^4.3.3
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  logger: ^2.3.0

  # =====================
  # MEDIA & QR
  # =====================
  image_picker: ^1.1.0
  video_player: ^2.8.5
  share_plus: ^9.0.0
  qr_flutter: ^4.1.0

  # =====================
  # UX POLISH
  # =====================
  keyboard_dismisser: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

dependency_overrides:
  web: ^1.0.0  # 🎯 Resolves conflicting web footprints across share_plus and Firebase

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
