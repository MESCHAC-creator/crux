name: crux
description: "Premium video conferencing with LiveKit. Secure, scalable, Francophone-first."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # =====================
  # REALTIME / VIDEO & AUDIO CONTROLS
  # =====================
  livekit_client: ^2.8.1
  audio_session: ^0.1.21       # 🎧 Gère les interruptions audio (appels cellulaires durant la visio)
  wakelock_plus: ^1.2.8        # 💡 Empêche l'écran de se mettre en veille pendant une réunion

  # =====================
  # STATE MANAGEMENT
  # =====================
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.3.5

  # =====================
  # FIREBASE (LATEST STABLE)
  # =====================
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.6.0
  firebase_messaging: ^15.3.0
  firebase_analytics: ^12.2.2
  firebase_crashlytics: ^5.3.0

  # =====================
  # NOTIFICATIONS AVANCÉES
  # =====================
  flutter_local_notifications: ^18.0.1 # 🔔 Gère les popups d'appels entrants sur l'écran de verrouillage

  # =====================
  # UI FRAMEWORK & LAYOUT
  # =====================
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.0
  lottie: ^3.1.0
  cached_network_image: ^3.4.1
  gap: ^3.0.1                  # 📏 Espacements UI simplifiés et plus performants

  # =====================
  # LOCALIZATION (FR + WEST AFRICAN)
  # =====================
  intl: ^0.20.2
  easy_localization: ^3.0.7

  # =====================
  # STORAGE & SECURITY
  # =====================
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4 # 🔒 Chiffrement des tokens de session et identifiants
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # =====================
  # PERMISSIONS & DEVICE
  # =====================
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  package_info_plus: ^8.1.2

  # =====================
  # NETWORKING
  # =====================
  dio: ^5.7.0
  http: ^1.2.2
  socket_io_client: ^3.1.2
  connectivity_plus: ^6.1.1

  # =====================
  # UTILITIES
  # =====================
  uuid: ^4.5.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  logger: ^2.4.0

  # =====================
  # MEDIA & QR
  # =====================
  image_picker: ^1.1.2
  video_player: ^2.9.2
  share_plus: ^10.1.2
  qr_flutter: ^4.1.0

  # =====================
  # UX POLISH
  # =====================
  keyboard_dismisser: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
