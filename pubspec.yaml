name: crux
description: "Premium video conferencing application for Francophone West Africa"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.24.5'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  get: ^4.6.5
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Firebase
  firebase_core: ^24.0.0
  firebase_auth: ^4.10.0
  firebase_firestore: ^4.13.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.7.0
  firebase_crashlytics: ^3.3.0
  firebase_remote_config: ^4.3.0
  firebase_storage: ^11.5.0

  # WebRTC & Networking
  flutter_webrtc: ^0.9.45
  agora_rtc_engine: ^6.2.0
  jitsi_meet_flutter_sdk: ^8.1.0
  dio: ^5.3.0
  http: ^1.1.0
  socket_io_client: ^2.0.0

  # UI & Design
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  custom_rounded_button: ^1.0.0
  lottie: ^2.6.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Localization & Internationalization
  intl: ^0.19.0
  easy_localization: ^3.0.0

  # Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0

  # Security & Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.7.0

  # Media & Camera
  image_picker: ^1.0.0
  video_player: ^2.7.0
  camera: ^0.10.0
  image_cropper: ^5.0.0

  # Permissions
  permission_handler: ^11.4.0
  geolocator: ^9.0.0

  # Logging & Analytics
  logger: ^2.0.0

  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  package_info_plus: ^5.0.0
  device_info_plus: ^9.0.0
  url_launcher: ^6.1.0
  path_provider: ^2.1.0
  timeago: ^3.5.0
  markdown: ^7.1.0

  # QR Code
  qr_flutter: ^4.0.0
  qr_code_scanner: ^1.0.0

  # Maps (optionnel)
  google_maps_flutter: ^2.5.0

  # PDF (optionnel)
  pdf: ^3.10.0
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code generation
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  riverpod_generator: ^2.3.0

  # Testing
  mockito: ^5.4.0
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/logos/
    - assets/translations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Bold.ttf
          weight: 700
