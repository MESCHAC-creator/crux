name: crux
description: "APPLICATION DE VISIOCONFÉRENCE - Vidéoconférence premium avec Agora.io et Firebase."
publish_to: 'none'

environment:
  sdk: '^3.12.0'

version: 1.0.0+1

dependencies:
  flutter:
    sdk: flutter

  # Firebase Services
  firebase_core: ^2.24.2
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_analytics: ^10.7.0

  # Agora RTC Video Conference
  agora_rtc_engine: ^6.2.0

  # Permissions
  permission_handler: ^11.1.0

  # Localization
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Networking
  http: ^1.1.0
  dio: ^5.4.0

  # Fonts
  google_fonts: ^6.1.0

  # Logging
  logger: ^2.0.0

  # Animations
  lottie: ^2.0.0

  # Local Storage
  shared_preferences: ^2.0.0

  # UUID Generator
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animation/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins-regular.ttf
          weight: 400
        - asset: assets/fonts/poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins-bold.ttf
          weight: 700
