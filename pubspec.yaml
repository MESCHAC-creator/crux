name: crux
description: "APPLICATION DE VISIOCONFÉRENCE ZOOM-LIKE"
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

version: 2.38.0+1

dependencies:
  flutter:
    sdk: flutter

  # ═══════════════════════════════════════════════════════════════════════════
  # FIREBASE (Complete)
  # ═══════════════════════════════════════════════════════════════════════════
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.2
  cloud_firestore: ^5.4.3
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2  # ✨ NEW: For recordings & profile photos

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTIFICATIONS
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_local_notifications: ^17.0.0

  # ═══════════════════════════════════════════════════════════════════════════
  # NETWORK & CONNECTIVITY
  # ═══════════════════════════════════════════════════════════════════════════
  connectivity_plus: ^6.0.3
  http: ^1.2.0

  # ═══════════════════════════════════════════════════════════════════════════
  # DEEP LINKING
  # ═══════════════════════════════════════════════════════════════════════════
  app_links: ^6.3.3

  # ═══════════════════════════════════════════════════════════════════════════
  # PERMISSIONS & LOCALIZATION
  # ═══════════════════════════════════════════════════════════════════════════
  permission_handler: ^11.3.0
  intl: any
  flutter_localizations:
    sdk: flutter

  # ═══════════════════════════════════════════════════════════════════════════
  # STATE MANAGEMENT & STORAGE
  # ═══════════════════════════════════════════════════════════════════════════
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ═══════════════════════════════════════════════════════════════════════════
  # ENVIRONMENT VARIABLES
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_dotenv: ^5.1.0  # ✨ NEW: Load .env file for API keys

  # ═══════════════════════════════════════════════════════════════════════════
  # VIDEO CONFERENCING - SFU/WebRTC
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_webrtc: ">=0.12.12+hotfix.1 <2.0.0"  # WebRTC base
  livekit_client: ^2.3.3  # Large conferences (open-source SFU)
  jitsi_meet: ^0.1.8  # ✨ NEW: 300+ participants

  # ═══════════════════════════════════════════════════════════════════════════
  # UTILITIES & CRYPTO
  # ═══════════════════════════════════════════════════════════════════════════
  uuid: ^4.2.1
  logger: ^2.1.0
  crypto: ^3.0.3

  # ═══════════════════════════════════════════════════════════════════════════
  # UI & ANIMATION
  # ═══════════════════════════════════════════════════════════════════════════
  google_fonts: ^6.2.1
  flutter_animate: ^4.2.0
  cached_network_image: ^3.4.1  # ✨ NEW: Cache images efficiently

  # ═══════════════════════════════════════════════════════════════════════════
  # FILE HANDLING
  # ═══════════════════════════════════════════════════════════════════════════
  file_picker: ^8.1.1  # ✨ NEW: Select files for upload
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # ═══════════════════════════════════════════════════════════════════════════
  # AUTHENTICATION & SOCIAL
  # ═══════════════════════════════════════════════════════════════════════════
  google_sign_in: ^6.2.1
  share_plus: ^10.0.0

  # ═══════════════════════════════════════════════════════════════════════════
  # SPEECH & AUDIO
  # ═══════════════════════════════════════════════════════════════════════════
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.0

  # ═══════════════════════════════════════════════════════════════════════════
  # DEVICE & SECURITY
  # ═══════════════════════════════════════════════════════════════════════════
  device_info_plus: ^11.1.1
  package_info_plus: ^9.0.1
  flutter_secure_storage: ^9.0.0

  # ═══════════════════════════════════════════════════════════════════════════
  # TIMEZONE & SCHEDULING
  # ═══════════════════════════════════════════════════════════════════════════
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0
  
  # ✨ NEW: Testing
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#E74C3C"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animation/
    - .env.local  # ✨ NEW: Load environment file
